<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Venn Diagram</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1> Game Venn Diagram</h1>
    <br>
    <h2>Discover the design intersections of your favorite games!</h2>
    <h5>Find if your games share similar design elements or lie towards one of the three design pillars</h5>
  </header>

  <main>
    <style>
        .circle {
            width: 400px;
            height: 400px;
            border: 4px solid #c7d5e0;
            position: relative;
            border-radius: 50%;

        }
    </style>
    <div class="circle" style="top: 0; left: 0;"></div>
    <div class="circle" style="top: -400px; left: 250px;"></div>
    <div class="circle" style="top: -550px; left: 125px;"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
